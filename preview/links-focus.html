<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=700, initial-scale=1">
<title>Silicate · links + focus</title>
<link rel="stylesheet" href="../silicate.css">
<style>
  body { margin: 0; }
  main { padding: 22px 28px; }
  .row { display: grid; grid-template-columns: 110px 1fr; gap: 14px; align-items: baseline; padding: 8px 0; border-top: 1px solid var(--silicate-rule); }
  .row:first-child { border-top: none; }
  .label { font-family: var(--silicate-font-mono); font-size: 11px; color: #665c54; text-transform: uppercase; letter-spacing: 0.06em; }
  a.fake-focus { outline: 2px solid var(--silicate-accent); outline-offset: 2px; }
  a.fake-hover { text-decoration-thickness: 2px; }
</style>
</head>
<body>
<main>
  <div class="row"><div class="label">link</div><div>An <a href="#">in-text link</a> within a sentence.</div></div>
  <div class="row"><div class="label">hover</div><div>An <a class="fake-hover" href="#">in-text link</a>: underline thickens to 2px.</div></div>
  <div class="row"><div class="label">focus</div><div>An <a class="fake-focus" href="#">in-text link</a>: 2px accent ring, 2px offset.</div></div>
  <div class="row"><div class="label">visited</div><div>Color does <em>not</em> change. We trust the URL bar.</div></div>
  <div class="row"><div class="label">external</div><div>An <a href="#">outside reference</a> ↗ — typographic, not iconic.</div></div>
</main>
</body>
</html>
