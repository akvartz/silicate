<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=700, initial-scale=1">
<title>Silicate · semantic colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: #fbf1c7; color: #3c3836; font: 400 14px/1.5 var(--silicate-font-sans); }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
  .item { display: flex; flex-direction: column; gap: 8px; }
  .chip { height: 52px; border: 1px solid #d5c4a1; }
  .name { font-weight: 600; }
  .hex { font-family: var(--silicate-font-mono); font-size: 11px; color: #665c54; }
  .note { font-size: 11px; color: #665c54; line-height: 1.4; }
  .head { font-family: var(--silicate-font-mono); font-size: 11px; color: #665c54; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.06em; }
</style>
</head>
<body>
  <div class="head">Used sparingly. Prose &gt; banners.</div>
  <div class="row">
    <div class="item"><div class="chip" style="background:#79740e"></div><div class="name">success</div><div class="hex">#79740e</div><div class="note">Faded green. Confirmation copy.</div></div>
    <div class="item"><div class="chip" style="background:#b57614"></div><div class="name">warning</div><div class="hex">#b57614</div><div class="note">Faded yellow. Cautions inside &lt;p&gt;.</div></div>
    <div class="item"><div class="chip" style="background:#9d0006"></div><div class="name">danger</div><div class="hex">#9d0006</div><div class="note">Faded red. Destructive prose only.</div></div>
  </div>
</body>
</html>
