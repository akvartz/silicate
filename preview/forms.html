<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=700, initial-scale=1">
<title>Silicate · forms</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 28px; background: var(--silicate-bg); color: var(--silicate-fg); font-family: var(--silicate-font-body); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: start; }
  form { margin: 0; }
  label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: var(--silicate-fg); }

  /* Bordered on all four sides — hairline, no radius, no shadow. */
  input[type="text"],
  input[type="email"],
  textarea {
    width: 100%;
    box-sizing: border-box;
    background: var(--silicate-bg);
    color: var(--silicate-fg);
    border: 1px solid var(--silicate-rule);
    border-radius: 0;
    padding: 8px 10px;
    margin-bottom: 14px;
    font: 400 15px/1.4 var(--silicate-font-body);
    outline: none;
  }
  input[type="text"]:focus,
  input[type="email"]:focus,
  textarea:focus {
    border-color: var(--silicate-accent);
    box-shadow: inset 0 0 0 1px var(--silicate-accent);
  }
  textarea { resize: vertical; min-height: 64px; }

  fieldset {
    border: 1px solid var(--silicate-rule);
    padding: 12px 14px 6px;
    margin: 0;
  }
  legend {
    font-family: var(--silicate-font-mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--silicate-fg-muted);
    padding: 0 6px;
  }
  fieldset label { font-weight: 400; margin-bottom: 6px; display: flex; gap: 8px; align-items: center; }
  fieldset input[type="radio"] { accent-color: var(--silicate-accent); }
</style>
</head>
<body>
  <div class="grid">
    <form>
      <label for="e">Email</label>
      <input id="e" type="email" placeholder="name@silicate.css">
      <label for="m">Message</label>
      <textarea id="m" rows="2" placeholder="Bordered on all four sides. No radius."></textarea>
    </form>
    <form>
      <fieldset>
        <legend>Mode</legend>
        <label><input type="radio" name="m" checked> Auto (OS)</label>
        <label><input type="radio" name="m"> Light only</label>
        <label><input type="radio" name="m"> Dark only</label>
      </fieldset>
    </form>
  </div>
</body>
</html>
