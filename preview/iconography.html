<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=700, initial-scale=1">
<title>Silicate · iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding: 22px 28px; background:#fbf1c7; color:#3c3836; font: 400 14px/1.5 var(--silicate-font-sans); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px 22px; }
  .item { display: flex; flex-direction: column; gap: 4px; }
  .glyph { font-family: var(--silicate-font-serif); font-size: 28px; line-height: 1; color: #3c3836; }
  .role { font-size: 12px; color: #665c54; }
  .head { font-family: var(--silicate-font-mono); font-size: 11px; color: #665c54; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
  .ban { color: #9d0006; font-weight: 600; }
</style>
</head>
<body>
  <div class="head">Words &gt; icons. Use typographic marks.</div>
  <div class="grid">
    <div class="item"><div class="glyph">↗</div><div class="role">External link</div></div>
    <div class="item"><div class="glyph">§</div><div class="role">Permalink</div></div>
    <div class="item"><div class="glyph">†</div><div class="role">Footnote</div></div>
    <div class="item"><div class="glyph">→</div><div class="role">Continue / next</div></div>
    <div class="item"><div class="glyph">+ −</div><div class="role">Disclosure</div></div>
    <div class="item"><div class="glyph">— ·</div><div class="role">Em dash · bullet</div></div>
    <div class="item"><div class="glyph">⌘ K</div><div class="role">Inside &lt;kbd&gt;</div></div>
    <div class="item"><div class="glyph ban">🎉</div><div class="role"><span class="ban">No emoji.</span></div></div>
  </div>
</body>
</html>
