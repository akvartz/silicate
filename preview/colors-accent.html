<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=700, initial-scale=1">
<title>Silicate · accent</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: #fbf1c7; color: #3c3836; font: var(--silicate-type-body); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; align-items: start; }
  .panel { display: flex; flex-direction: column; gap: 12px; }
  .panel.dark { background: #282828; color: #ebdbb2; padding: 18px 20px; }
  .swatch { height: 56px; }
  .swatch.l { background: #af3a03; }
  .swatch.d { background: #fe8019; }
  .label { font-family: var(--silicate-font-mono); font-size: 11px; color: #665c54; }
  .panel.dark .label { color: #a89984; }
  a.demo { color: #af3a03; }
  .panel.dark a.demo { color: #fe8019; }
  .h { font-family: var(--silicate-font-mono); font-size: 11px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="panel">
      <div class="swatch l"></div>
      <div class="label">--silicate-accent · light</div>
      <div class="h">#af3a03 · gruvbox faded orange</div>
      <div>Used for <a class="demo" href="#">links</a>, focus rings, and the filled submit button.</div>
    </div>
    <div class="panel dark">
      <div class="swatch d"></div>
      <div class="label">--silicate-accent · dark</div>
      <div class="h">#fe8019 · gruvbox bright orange</div>
      <div>Used for <a class="demo" href="#">links</a>, focus rings, and the filled submit button.</div>
    </div>
  </div>
</body>
</html>
