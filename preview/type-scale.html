<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=700, initial-scale=1">
<title>Silicate · type · scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding: 24px 32px; background:#fbf1c7; color:#3c3836; font-family: var(--silicate-font-body); }
  .row { display: grid; grid-template-columns: 96px 1fr; align-items: baseline; gap: 16px; padding: 6px 0; border-top: 1px solid #d5c4a1; }
  .row:first-child { border-top: none; }
  .tag { font-family: var(--silicate-font-mono); font-size: 11px; color:#665c54; }
  h1,h2,h3,h4,h5,h6,p { margin: 0; line-height: 1.2; font-weight: 600; }
  h5 { text-transform: uppercase; letter-spacing: 0.06em; color: #665c54; font-size: 16px; }
  .body { font-weight: 400; line-height: 1.55; font-size: 18px; }
</style>
</head>
<body>
  <div class="row"><div class="tag">h1 · 36</div><h1>The book page</h1></div>
  <div class="row"><div class="tag">h2 · 26</div><h2>One readable column</h2></div>
  <div class="row"><div class="tag">h3 · 20</div><h3>Hairlines, not boxes</h3></div>
  <div class="row"><div class="tag">h4 · 17</div><h4>If HTML has a tag, use it</h4></div>
  <div class="row"><div class="tag">h5 · 16</div><h5>Eyebrow label</h5></div>
  <div class="row"><div class="tag">body · 18</div><div class="body">Eighteen-point serif at 1.55. The default.</div></div>
</body>
</html>
