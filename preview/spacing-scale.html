<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=700, initial-scale=1">
<title>Silicate · spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding: 22px 28px; background:#fbf1c7; color:#3c3836; font: 400 13px/1.4 var(--silicate-font-sans); }
  .row { display: grid; grid-template-columns: 80px 60px 1fr; gap: 12px; align-items: center; padding: 6px 0; }
  .tok { font-family: var(--silicate-font-mono); font-size: 11px; color: #3c3836; }
  .px { font-family: var(--silicate-font-mono); font-size: 11px; color: #665c54; }
  .bar { background: #3c3836; height: 10px; }
</style>
</head>
<body>
  <div class="row"><div class="tok">space-1</div><div class="px">4px</div><div><div class="bar" style="width:4px"></div></div></div>
  <div class="row"><div class="tok">space-2</div><div class="px">8px</div><div><div class="bar" style="width:8px"></div></div></div>
  <div class="row"><div class="tok">space-3</div><div class="px">16px</div><div><div class="bar" style="width:16px"></div></div></div>
  <div class="row"><div class="tok">space-4</div><div class="px">24px</div><div><div class="bar" style="width:24px"></div></div></div>
  <div class="row"><div class="tok">space-5</div><div class="px">32px</div><div><div class="bar" style="width:32px"></div></div></div>
  <div class="row"><div class="tok">space-6</div><div class="px">48px</div><div><div class="bar" style="width:48px"></div></div></div>
  <div class="row"><div class="tok">space-7</div><div class="px">80px</div><div><div class="bar" style="width:80px"></div></div></div>
</body>
</html>
