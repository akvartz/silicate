<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=700, initial-scale=1">
<title>Silicate · wordmark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; display: grid; grid-template-columns: 1fr 1fr; min-height: 180px; font-family: var(--silicate-font-body); }
  .panel { display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px; padding: 24px; }
  .light { background: #fbf1c7; color: #3c3836; }
  .dark  { background: #282828; color: #ebdbb2; }
  .mark { font-size: 40px; font-weight: 600; letter-spacing: -0.01em; line-height: 1; }
  .label { font-family: var(--silicate-font-mono); font-size: 10px; color: currentColor; opacity: 0.6; text-transform: uppercase; letter-spacing: 0.06em; }
</style>
</head>
<body>
  <div class="panel light"><div class="mark">silicate</div><div class="label">on light · #fbf1c7</div></div>
  <div class="panel dark"><div class="mark">silicate</div><div class="label">on dark · #282828</div></div>
</body>
</html>
