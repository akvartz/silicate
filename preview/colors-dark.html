<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=700, initial-scale=1">
<title>Silicate · color · dark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: #282828; color: #ebdbb2; font: 400 14px/1.4 var(--silicate-font-sans); }
  .row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; }
  .swatch { display: flex; flex-direction: column; gap: 6px; }
  .chip { height: 64px; border: 1px solid #504945; }
  .name { font-weight: 600; font-size: 12px; color: #ebdbb2; }
  .hex  { font-family: var(--silicate-font-mono); font-size: 11px; color: #a89984; }
</style>
</head>
<body>
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#282828"></div><div class="name">bg</div><div class="hex">#282828</div></div>
    <div class="swatch"><div class="chip" style="background:#3c3836"></div><div class="name">bg-sunken</div><div class="hex">#3c3836</div></div>
    <div class="swatch"><div class="chip" style="background:#ebdbb2"></div><div class="name">fg</div><div class="hex">#ebdbb2</div></div>
    <div class="swatch"><div class="chip" style="background:#a89984"></div><div class="name">fg-muted</div><div class="hex">#a89984</div></div>
    <div class="swatch"><div class="chip" style="background:#7c6f64"></div><div class="name">fg-faint</div><div class="hex">#7c6f64</div></div>
    <div class="swatch"><div class="chip" style="background:#504945"></div><div class="name">rule</div><div class="hex">#504945</div></div>
    <div class="swatch"><div class="chip" style="background:#fe8019"></div><div class="name">accent</div><div class="hex">#fe8019</div></div>
  </div>
</body>
</html>
