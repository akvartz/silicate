<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=700, initial-scale=1">
<title>Silicate · principles</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 28px; background: #fbf1c7; color: #3c3836; font-family: var(--silicate-font-body); }
  .row { padding: 8px 0; border-top: 1px solid #d5c4a1; display: grid; grid-template-columns: 28px 1fr; gap: 12px; align-items: baseline; }
  .row:first-child { border-top: none; }
  .n { font-family: var(--silicate-font-mono); font-size: 11px; color: #928374; }
  .t { font-size: 16px; }
  .t b { font-weight: 600; }
</style>
</head>
<body>
  <div class="row"><div class="n">01</div><div class="t"><b>Use the tag.</b> If HTML has it, use it.</div></div>
  <div class="row"><div class="n">02</div><div class="t"><b>No classes.</b> Style by element.</div></div>
  <div class="row"><div class="n">03</div><div class="t"><b>One column, ~70ch.</b> Escape with <code>data-bleed</code>.</div></div>
  <div class="row"><div class="n">04</div><div class="t"><b>One accent.</b> Burnt sienna, full stop.</div></div>
  <div class="row"><div class="n">05</div><div class="t"><b>Hairlines, not boxes.</b> 1px rules &gt; cards.</div></div>
  <div class="row"><div class="n">06</div><div class="t"><b>No shadows, no radius, no gradients.</b></div></div>
  <div class="row"><div class="n">07</div><div class="t"><b>OS-driven dark mode.</b> No toggle.</div></div>
</body>
</html>
