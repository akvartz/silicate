<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=700, initial-scale=1">
<title>Silicate · measure</title>
<link rel="stylesheet" href="../silicate.css">
<style>
  body { margin: 0; }
  main { padding: 18px 0 24px; }
  .ruler { max-width: 34rem; margin: 0 auto 6px; padding: 0 1.5rem; font-family: var(--silicate-font-mono); font-size: 11px; color: #665c54; display: flex; justify-content: space-between; }
  .bar { max-width: 34rem; margin: 0 auto 14px; padding: 0; border-top: 1px solid #d5c4a1; }
  p { font-size: 18px; }
</style>
</head>
<body>
<main>
  <div class="ruler"><span>0</span><span>34rem · ~70 characters · 612px</span></div>
  <div class="bar"></div>
  <p>The measure is the design. Everything else follows from a column the eye can return to without losing its place.</p>
</main>
</body>
</html>
