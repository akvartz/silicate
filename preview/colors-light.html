<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=700, initial-scale=1">
<title>Silicate · color · light</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: #fbf1c7; color: #3c3836; font: 400 14px/1.4 var(--silicate-font-sans); }
  .row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; }
  .swatch { display: flex; flex-direction: column; gap: 6px; }
  .chip { height: 64px; border: 1px solid #d5c4a1; }
  .name { font-weight: 600; font-size: 12px; color: #3c3836; }
  .hex  { font-family: var(--silicate-font-mono); font-size: 11px; color: #665c54; }
</style>
</head>
<body>
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#fbf1c7"></div><div class="name">bg</div><div class="hex">#fbf1c7</div></div>
    <div class="swatch"><div class="chip" style="background:#ebdbb2"></div><div class="name">bg-sunken</div><div class="hex">#ebdbb2</div></div>
    <div class="swatch"><div class="chip" style="background:#3c3836"></div><div class="name">fg</div><div class="hex">#3c3836</div></div>
    <div class="swatch"><div class="chip" style="background:#665c54"></div><div class="name">fg-muted</div><div class="hex">#665c54</div></div>
    <div class="swatch"><div class="chip" style="background:#928374"></div><div class="name">fg-faint</div><div class="hex">#928374</div></div>
    <div class="swatch"><div class="chip" style="background:#d5c4a1"></div><div class="name">rule</div><div class="hex">#d5c4a1</div></div>
    <div class="swatch"><div class="chip" style="background:#af3a03"></div><div class="name">accent</div><div class="hex">#af3a03</div></div>
  </div>
</body>
</html>
